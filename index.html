function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

let score = 0;
let answered = 0;

function loadQuiz(){
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";
  score = 0;
  answered = 0;
  document.getElementById("score").innerText = "Điểm: 0/100";

  let list = shuffle([...questions]);

  list.forEach((item,index)=>{
    const box = document.createElement("div");
    box.className = "question";
    box.innerHTML = `<h3>Câu ${index+1}: ${item.q}</h3>`;

    item.a.forEach((ans,i)=>{
      const btn = document.createElement("button");
      btn.className = "answer";
      btn.innerText = String.fromCharCode(65+i)+". "+ans;

      btn.onclick = function(){
        if(box.dataset.done) return;
        box.dataset.done = true;
        answered++;

        const buttons = box.querySelectorAll(".answer");

        if(i === item.correct){
          btn.classList.add("correct");
          score++;
          box.innerHTML += `<div class="result" style="color:#4ade80">Đúng</div>`;
        }else{
          btn.classList.add("wrong");
          buttons[item.correct].classList.add("correct");
          box.innerHTML += `<div class="result" style="color:#f87171">
          Sai — Đáp án đúng: ${String.fromCharCode(65+item.correct)}. ${item.a[item.correct]}
          </div>`;
        }

        document.getElementById("score").innerText = `Điểm: ${score}/100`;

        if(answered === 100){
          setTimeout(()=>alert(`Hoàn thành! Em đúng ${score}/100 câu`),300);
        }
      };

      box.appendChild(btn);
    });

    quiz.appendChild(box);
  });

  window.scrollTo(0,0);
}

loadQuiz();
</script>
